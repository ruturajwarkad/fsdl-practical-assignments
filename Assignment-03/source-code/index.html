<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Amazon Shop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- navbar -->
<header id="navBar">
<div class="logo">Mini<span>Amazon</span></div>
<input id="searchBox" type="text" placeholder="Search products...">
<button id="cartBtn" onclick="showCart()">Cart 🛒</button>
</header>

<!-- hero section -->
<section id="heroSection">
<div class="heroText">Welcome to Mini Amazon!</div>
</section>

<!-- products -->
<section id="home">
<h2>Products</h2>
<div class="products">
  <div class="card">
    <img src="images/smartwatch.jpg">
    <h3>Smartwatch</h3>
    <p>₹2999</p>
    <button onclick="addToCart('Smartwatch',2999)">Add to Cart</button>
  </div>
  <div class="card">
    <img src="images/shoes.jpeg">
    <h3>Shoes</h3>
    <p>₹1499</p>
    <button onclick="addToCart('Shoes',1499)">Add to Cart</button>
  </div>
  <div class="card">
    <img src="images/books.jpg">
    <h3>Books</h3>
    <p>₹499</p>
    <button onclick="addToCart('Books',499)">Add to Cart</button>
  </div>
  <div class="card">
    <img src="images/tablet.png">
    <h3>Tablet</h3>
    <p>₹11999</p>
    <button onclick="addToCart('Tablet',11999)">Add to Cart</button>
  </div>
  <div class="card">
    <img src="images/camera.png">
    <h3>Camera</h3>
    <p>₹15999</p>
    <button onclick="addToCart('Camera',15999)">Add to Cart</button>
  </div>
  <div class="card">
    <img src="images/earbuds.jpg">
    <h3>Earbuds</h3>
    <p>₹899</p>
    <button onclick="addToCart('Earbuds',899)">Add to Cart</button>
  </div>
</div>
</section>

<!-- CART -->
<section id="cart">
<h2>Your Cart</h2>
<ul id="cartItems"></ul>
<h3 id="totalPrice"></h3>
<button onclick="checkout()">Proceed to Checkout</button>
</section>

<!-- CHECKOUT -->
<section id="checkout">
<h2>Checkout</h2>
<input placeholder="Your Name">
<input placeholder="Shipping Address">
<button onclick="placeOrder()">Place Order</button>
</section>

<!-- BILL -->
<section id="bill">
<h2>Final Bill</h2>
<p id="billAmount"></p>
<p>Thank you for shopping!</p>
</section>

<script src="script.js"></script>
</body>
</html>
